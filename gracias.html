<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias! | Centro CEMEK</title>
  <link rel="icon" href="assets/logo.png">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- ============================================================
    GOOGLE ADS — PEGÁ ACÁ EL SNIPPET DE CONVERSIÓN
    ---------------------------------------------------------------
    En Google Ads: Herramientas → Medición → Conversiones
    → hacé clic en tu conversión → Etiqueta → "Fragmento de evento"
    Reemplazá este bloque de comentario con ese código.
    El código luce así:
      <script> gtag('event', 'conversion', { ... }); </script>
  ============================================================ -->

  <style>
    :root {
      --primary: #264873;
      --primary-dark: #1a3354;
      --dark: #07003a;
      --light: #d6e4e8;
      --wa: #25D366;
      --wa-dark: #1ebe5e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #f0f5f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      background: rgba(7,0,58,0.97);
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      flex-shrink: 0;
    }
    .header-logo img { height: 34px; width: auto; display: block; }
    .back-link {
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: white; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 48px rgba(38,72,115,0.13);
      padding: 56px 48px;
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    /* CHECKMARK */
    .check-wrap {
      width: 88px;
      height: 88px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .check-wrap svg { color: #16a34a; }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 0.97rem;
      color: #718096;
      line-height: 1.65;
      margin-bottom: 32px;
    }

    /* COUNTDOWN */
    .countdown-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 0.85rem;
      color: #a0aec0;
      font-weight: 500;
      margin-bottom: 24px;
    }
    #countdown {
      font-weight: 800;
      color: var(--wa);
      font-size: 1rem;
      min-width: 16px;
      display: inline-block;
    }

    /* WA BUTTON */
    .wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--wa);
      color: white;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 17px 32px;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      margin-bottom: 18px;
      letter-spacing: 0.2px;
    }
    .wa-btn:hover {
      background: var(--wa-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37,211,102,0.35);
    }

    .divider { color: #e2e8f0; margin-bottom: 18px; font-size: 0.85rem; }

    .home-link {
      display: inline-block;
      font-size: 0.85rem;
      color: #a0aec0;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .home-link:hover { color: var(--primary); }

    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 1.4rem; }
      header { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="header-logo">
      <img src="assets/logo.png" alt="Centro CEMEK">
    </a>
    <a href="index.html" class="back-link">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Volver al inicio
    </a>
  </header>

  <main>
    <div class="card">

      <div class="check-wrap">
        <svg width="44" height="44" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>

      <h1>¡Tu consulta está en camino!</h1>
      <p class="subtitle">
        Estamos abriendo WhatsApp para que puedas enviarnos tu mensaje.<br>
        Te responderemos a la brevedad.
      </p>

      <div class="countdown-row">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        Abriendo en <span id="countdown">3</span> seg...
      </div>

      <a id="wa-btn" href="#" target="_blank" rel="noopener noreferrer" class="wa-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Abrir WhatsApp ahora
      </a>

      <p class="divider">—</p>
      <a href="index.html" class="home-link">← Volver al sitio de Centro CEMEK</a>

    </div>
  </main>

  <script>
    // Lee el parámetro ?wa= si viene de una tarjeta de profesional (mensaje personalizado)
    // o usa el mensaje genérico si viene de los botones generales
    var params = new URLSearchParams(window.location.search);
    var waUrl = params.get('wa')
      ? decodeURIComponent(params.get('wa'))
      : 'https://wa.me/5493413211244?text=Hola!%20Me%20gustar%C3%ADa%20reservar%20un%20turno%20en%20Centro%20CEMEK.%20%C2%BFMe%20pod%C3%A9s%20brindar%20informaci%C3%B3n%3F';

    document.getElementById('wa-btn').href = waUrl;

    var secs = 3;
    var el = document.getElementById('countdown');
    var timer = setInterval(function () {
      secs--;
      el.textContent = secs;
      if (secs <= 0) {
        clearInterval(timer);
        window.location.href = waUrl;
      }
    }, 1000);
  </script>

</body>
</html>
